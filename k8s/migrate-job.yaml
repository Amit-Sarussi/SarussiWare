# IMAGE is substituted by deploy-k8s.sh
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-${TAG}
  namespace: sarussiware
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ${IMAGE}
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
